<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#667eea">
  <title>10C7 AIO - Thông báo</title>
  <link rel="stylesheet" href="../style/tb.css">
  <link rel="stylesheet" href="../style/console.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <!-- Quill Editor CSS -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Critical CSS: Ẩn ngay lập tức các modal khi trang vừa nạp */
    #notificationModal, #notifContentModal { 
      display: none !important; 
      position: fixed !important; 
      top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.7); 
      z-index: 9999; 
      align-items: center; 
      justify-content: center; 
      backdrop-filter: blur(8px);
    }
    #notificationModal.show, #notifContentModal.show { 
      display: flex !important; 
    }
    .modal-content { 
      background: white; 
      border-radius: 20px; 
      padding: 0; 
      max-width: 700px; 
      width: 90%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }
    /* Chống giật lag layout khi chưa load xong CSS */
    .admin-controls { min-height: 50px; }
    .notification-list { min-height: 200px; }
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
    }
    @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="../" class="back-btn">←</a>
      <h1>🔔 Thông Báo</h1>
      <p>Tất cả thông báo của bạn</p>
    </div>
  </header>

  <section class="notification-section">
    <!-- Admin Controls -->
    <div class="admin-controls" id="adminControls" style="display: none; margin-bottom: 20px;">
      <button class="add-btn" onclick="openNotificationModal()" style="width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);">+ Đăng Thông Báo Mới</button>
    </div>

    <div class="filter-buttons">
      <button class="filter-btn active" onclick="filterNotifications('all', event)">Tất cả</button>
      <button class="filter-btn" onclick="filterNotifications('info', event)">Thông tin</button>
      <button class="filter-btn" onclick="filterNotifications('warning', event)">Cảnh báo</button>
      <button class="filter-btn" onclick="filterNotifications('success', event)">Thành công</button>
    </div>

    <ul class="notification-list" id="notificationList">
      <!-- Thông báo sẽ được thêm vào đây -->
    </ul>
  </section>

  <!-- Modal Thêm Thông Báo -->
  <div id="notificationModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📢 Đăng Thông Báo</h2>
        <button class="modal-close" type="button" onclick="closeNotificationModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Tiêu đề / Nội dung ngắn (*)</label>
          <input type="text" id="modalNotifTitle" placeholder="Ví dụ: Thông báo họp lớp ngày mai...">
        </div>
        <div class="form-group">
          <label>Loại thông báo</label>
          <div class="form-group-select">
            <select id="modalNotifType">
              <option value="info">ℹ️ Thông tin chung</option>
              <option value="warning">⚠️ Cảnh báo / Nhắc nhở</option>
              <option value="success">✅ Quan trọng / Ưu tiên</option>
              <option value="error">❌ Khẩn cấp / Bắt buộc</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Nội dung chi tiết (Tuỳ chọn)</label>
          <div id="notif-editor-container" style="height: 200px;"></div>
        </div>
        <button class="save-btn" onclick="saveNotification()" style="width: 100%; margin-top: 15px;">Đăng Thông Báo</button>
      </div>
    </div>
  </div>

  <!-- Modal Xem Chi Tiết Thông Báo -->
  <div id="notifContentModal" class="modal">
    <div class="modal-content content-view-modal">
      <div class="modal-header">
        <h2 id="viewNotifTitle">Chi tiết thông báo</h2>
        <button class="modal-close" type="button" onclick="closeNotifContentModal()">✕</button>
      </div>
      <div class="modal-body ql-editor" id="viewNotifBody"></div>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; 2026 Lớp 10C7</p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="../script/firebase-config.js"></script>
  <script src="../script/firebase-utils.js"></script>
  <script src="../script/hub.js"></script>
  <script src="../script/students-list.js"></script>
  <!-- Quill Editor JS -->
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <!-- Load tb.js cuối cùng sau khi các thư viện đã sẵn sàng -->
  <script src="../script/tb.js"></script>
</body>
</html>
